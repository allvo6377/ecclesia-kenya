  <title>Administrator sign-in — Ecclesia Kenya</title>
  <script>
    // /admin (or /admin/) -> open the app's administrator sign-in.
    (function () {
      var base = location.pathname.replace(/\/admin\/?$/i, "/");
      location.replace(base + "#admin");
    })();
  </script>
